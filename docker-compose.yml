services:

  # ─────────────────────────────────────────
  # NETBOX  (CMDB / Source of Truth)
  # ─────────────────────────────────────────
  netbox:
    image: netboxcommunity/netbox:v4.2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    volumes:
      - netbox-media:/opt/netbox/netbox/media
    ports:
      - "8080:8080"
    networks:
      - management-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  netbox-worker:
    image: netboxcommunity/netbox:v4.2
    depends_on:
      netbox:
        condition: service_healthy
    env_file: .env
    command: /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker
    networks:
      - management-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - management-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: .env
    volumes:
      - redis-data:/data
    networks:
      - management-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # PROMETHEUS  (Metriken-Sammlung)
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - management-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # IPMI EXPORTER  (Redfish/IPMI → Prometheus)
  # ─────────────────────────────────────────
  ipmi-exporter:
    image: prometheuscommunity/ipmi-exporter:latest
    volumes:
      - ./monitoring/ipmi-exporter/ipmi_remote.yml:/etc/ipmi_exporter/ipmi_remote.yml:ro
    ports:
      - "9290:9290"
    networks:
      - management-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # GRAFANA  (Dashboards / Visualisierung)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    ports:
      - "3000:3000"
    networks:
      - management-net
    restart: unless-stopped

networks:
  management-net:
    driver: bridge

volumes:
  netbox-media:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
