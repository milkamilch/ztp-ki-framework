#cloud-config
# ──────────────────────────────────────────────────────────────
# Ubuntu Server 24.04 LTS — Autoinstall-Konfiguration
# Docs: https://ubuntu.com/server/docs/install/autoinstall-reference
#
# Diese Datei wird pro MAC-Adresse unter
#   /srv/www/pxe/autoinstall/<mac-adresse>/user-data
# abgelegt, damit jeder Server seine eigene Config bekommt.
# ──────────────────────────────────────────────────────────────

autoinstall:
  version: 1

  locale: de_DE.UTF-8

  keyboard:
    layout: de
    variant: ""

  # ──────────────────────────────────────────
  # Netzwerk — DHCP während Installation
  # ──────────────────────────────────────────
  network:
    network:
      version: 2
      ethernets:
        primary:
          match:
            name: "en*"
          dhcp4: true
          dhcp6: false

  # ──────────────────────────────────────────
  # Speicher — LVM auf gesamter Disk
  # ──────────────────────────────────────────
  storage:
    layout:
      name: lvm
      match:
        size: largest

  # ──────────────────────────────────────────
  # Benutzer
  # Passwort-Hash generieren: mkpasswd --method=SHA-512
  # ──────────────────────────────────────────
  identity:
    hostname: ztp-node
    username: ubuntu
    # Placeholder — im echten Deploy ersetzen oder per late-command setzen
    password: "$6$rounds=4096$placeholder$CHANGE_THIS_HASH"

  # ──────────────────────────────────────────
  # SSH
  # ──────────────────────────────────────────
  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - "ssh-ed25519 AAAAC3... your-public-key-here"

  # ──────────────────────────────────────────
  # Pakete
  # ──────────────────────────────────────────
  packages:
    - python3
    - python3-pip
    - curl
    - wget
    - net-tools
    - ipmitool
    - ansible

  # ──────────────────────────────────────────
  # Post-Install-Befehle
  # Werden im Ziel-System ausgeführt (chroot)
  # ──────────────────────────────────────────
  late-commands:
    # SSH sicherstellen
    - curtin in-target --target=/target -- systemctl enable ssh

    # Ansible-Trigger: Management Node führt Post-Install-Playbook aus
    - curtin in-target --target=/target -- curl -sf http://192.168.100.1/ansible/trigger.sh -o /tmp/trigger.sh
    - curtin in-target --target=/target -- bash /tmp/trigger.sh

    # Hostname dynamisch setzen (nach IP aus DHCP-Lease ableitbar)
    # - curtin in-target --target=/target -- hostnamectl set-hostname ztp-$(ip -4 -o addr show | awk 'NR==2{print $4}' | cut -d/ -f1 | tr . -)

  # ──────────────────────────────────────────
  # Neustart nach Installation
  # ──────────────────────────────────────────
  shutdown: reboot
