# ──────────────────────────────────────────────────────────────
# dnsmasq — DHCP + TFTP für ZTP-Framework
# Management Node IP: 192.168.100.1  (anpassen)
# Interface:          eth1            (anpassen, z.B. ens18)
# DHCP-Range:         192.168.100.100 – 192.168.100.200
# ──────────────────────────────────────────────────────────────

# Nur auf Management-Interface lauschen
interface=eth1
bind-interfaces

# Kein DNS-Resolver — nur DHCP + TFTP
port=0
domain=ztp.local

# ──────────────────────────────────────────
# DHCP
# ──────────────────────────────────────────
dhcp-range=192.168.100.100,192.168.100.200,12h

# Standard-Gateway + DNS für provisionierte Server
dhcp-option=option:router,192.168.100.1
dhcp-option=option:dns-server,8.8.8.8,8.8.4.4

# DHCP-Lease-Log
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# ──────────────────────────────────────────
# TFTP (eingebauter TFTP-Server von dnsmasq)
# ──────────────────────────────────────────
enable-tftp
tftp-root=/srv/tftp

# ──────────────────────────────────────────
# PXE-Boot-Datei: BIOS vs. UEFI
# ──────────────────────────────────────────

# BIOS-Client (x86): undionly.kpxe
dhcp-match=set:bios,option:client-arch,0
dhcp-boot=tag:bios,undionly.kpxe

# UEFI 64-Bit: ipxe.efi
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9
dhcp-boot=tag:efi64,ipxe.efi

# Sobald iPXE geladen ist, leitet es an boot.ipxe weiter.
# iPXE sendet "iPXE" im User-Class-Feld → wir servieren das Script.
dhcp-match=set:ipxe,175
dhcp-boot=tag:ipxe,http://192.168.100.1/pxe/boot.ipxe

# ──────────────────────────────────────────
# Logging
# ──────────────────────────────────────────
log-dhcp
log-facility=/var/log/dnsmasq.log
