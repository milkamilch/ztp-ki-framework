# ──────────────────────────────────────────────────────────────
# ZTP-Framework — Ansible Inventory
#
# [provisioning]  Server, die gerade provisioniert werden.
#                 Werden dynamisch vom ZTP-Prozess eingetragen.
# [managed]       Erfolgreich provisionierte und registrierte Server.
# [management]    Management Node selbst (für lokale Tasks).
# ──────────────────────────────────────────────────────────────

[provisioning]
# 192.168.100.101 bmc_ip=192.168.100.201
# 192.168.100.102 bmc_ip=192.168.100.202

[managed]
# Werden nach erfolgreicher Provisionierung hierher verschoben

[management]
localhost ansible_connection=local

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/ztp_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
